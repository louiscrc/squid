<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kraken GIF Editor</title>
  <link rel="stylesheet" href="/monitor/app.css" />
  <style>
    .gif-main {
      display: grid;
      grid-template-columns: 320px 1fr;
      height: calc(100% - 57px);
    }
    .dial {
      width: min(640px, 70vmin);
      height: min(640px, 70vmin);
      border-radius: 50%;
      overflow: hidden;
      background: #000;
      position: relative;
      margin: 24px auto;
      touch-action: none;
      cursor: grab;
    }
    .dial:active { cursor: grabbing; }
    .dial img {
      position: absolute;
      left: 50%;
      top: 50%;
      max-width: none;
      user-select: none;
      pointer-events: none;
      transform-origin: center center;
    }
    .slider-row {
      display: grid;
      gap: 6px;
      margin-bottom: 14px;
    }
    .slider-row label {
      display: flex;
      justify-content: space-between;
      color: var(--muted);
      font-size: 12px;
    }
    input[type="range"] { width: 100%; }
    .file-row { margin-bottom: 12px; }
    .file-row input[type="file"] { width: 100%; color: var(--muted); font-size: 12px; }
    .search-row {
      display: flex;
      gap: 6px;
      margin-bottom: 10px;
    }
    .search-row input[type="text"] {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--ring);
      color: var(--text);
      border-radius: 6px;
      padding: 8px 10px;
    }
    .search-row button { padding: 8px 12px; }
    .results {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      max-height: 280px;
      overflow: auto;
      margin-bottom: 14px;
      padding-right: 2px;
    }
    .results button {
      padding: 0;
      background: #0a0c12;
      border: 1px solid var(--ring);
      border-radius: 8px;
      overflow: hidden;
      aspect-ratio: 1;
    }
    .results button.selected { border-color: var(--accent); }
    .results img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .slider-row .inline {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      justify-content: space-between;
    }
    .slider-row input[type="color"] {
      width: 42px;
      height: 28px;
      padding: 0;
      border: 1px solid var(--ring);
      background: transparent;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <header class="top">
    <h1>Kraken GIF</h1>
    <div class="status" id="status">Search Giphy or upload…</div>
    <div class="actions">
      <button type="button" id="btnApply" disabled>Apply to LCD</button>
    </div>
  </header>
  <main class="gif-main">
    <aside class="palette">
      <h2>Giphy</h2>
      <label class="hint">API key (saved as giphy.key)
        <input type="password" id="giphyKey" placeholder="from developers.giphy.com" autocomplete="off" />
      </label>
      <div class="search-row">
        <input type="text" id="query" placeholder="cats, neon, 404…" />
        <button type="button" id="btnSearch">Search</button>
      </div>
      <div class="results" id="results"></div>

      <h2>Upload your own gif</h2>
      <div class="file-row">
        <input type="file" id="file" accept="image/gif,.gif" />
      </div>

      <h2>Framing</h2>
      <div class="slider-row">
        <label>Zoom <span id="zoomVal">1.00</span></label>
        <input type="range" id="zoom" min="0.25" max="3" step="0.01" value="1" />
      </div>
      <div class="slider-row">
        <label>Pan X <span id="panXVal">0.00</span></label>
        <input type="range" id="panX" min="-1" max="1" step="0.01" value="0" />
      </div>
      <div class="slider-row">
        <label>Pan Y <span id="panYVal">0.00</span></label>
        <input type="range" id="panY" min="-1" max="1" step="0.01" value="0" />
      </div>
      <div class="slider-row">
        <label class="inline">Background <input type="color" id="bgColor" value="#000000" /></label>
      </div>
      <button type="button" id="btnReset" class="secondary">Reset framing</button>
      <p class="preview-note">Orientation uses the plugin LCD Orientation Degrees when applied.</p>
    </aside>
    <section class="stage-wrap">
      <div class="dial" id="dial">
        <img id="previewGif" alt="" hidden />
      </div>
    </section>
  </main>
  <script type="module" src="/monitor/gif.js"></script>
</body>
</html>
