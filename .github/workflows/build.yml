name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Python 3.14
        run: uv python install 3.14
      - name: Unit tests
        run: |
          uv venv --python 3.14
          uv pip install pytest Pillow
          PYTHONPATH=. uv run --python 3.14 pytest tests/test_metrics.py -q

  windows-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Python 3.14 + deps
        shell: pwsh
        run: |
          uv python install 3.14
          uv venv --python 3.14
          .\.venv\Scripts\Activate.ps1
          uv pip install -r requirements.txt

      - name: Build q565_rust + SignalRGBLCDBridge.exe
        shell: pwsh
        run: |
          .\.venv\Scripts\Activate.ps1
          $env:Path = "$env:USERPROFILE\.cargo\bin;$env:Path"
          .\build.ps1

      - name: Upload exe
        uses: actions/upload-artifact@v4
        with:
          name: SignalRGBLCDBridge-windows-amd64
          path: dist/SignalRGBLCDBridge.exe
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, windows-exe]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: SignalRGBLCDBridge-windows-amd64
          path: dist
      - name: Attach exe to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/SignalRGBLCDBridge.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
